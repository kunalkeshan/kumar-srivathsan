name: Sync package.json version with release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to set (e.g. v1.2.3 or 1.2.3). Leave empty to use latest release tag"
        required: false

jobs:
  update-version:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Resolve version
        run: |
          # If manually triggered and version provided → use it
          if [ -n "${{ github.event.inputs.version }}" ]; then
            TAG_NAME="${{ github.event.inputs.version }}"
            echo "Using manual version: $TAG_NAME"
          else
            TAG_NAME="${{ github.event.release.tag_name }}"
            echo "Using release tag: $TAG_NAME"
          fi

          if [ -z "$TAG_NAME" ]; then
            echo "No version provided, exiting"
            exit 1
          fi

          echo "APP_VERSION=$TAG_NAME" >> $GITHUB_ENV

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update package.json version
        run: |
          VERSION=${APP_VERSION#v}
          npm version $VERSION --no-git-tag-version
          echo "Updated version to $VERSION"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add package.json package-lock.json || true
          git commit -m "chore: sync package.json version to $APP_VERSION" || echo "No changes to commit"
          git push origin main
