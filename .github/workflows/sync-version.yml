name: Sync package.json version with release

on:
  release:
    types: [published]

jobs:
  update-version:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # REQUIRED to push changes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main  # ensure we update main branch

      - name: Get release tag
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"

          if [ -z "$TAG_NAME" ]; then
            echo "No tag found, exiting"
            exit 1
          fi

          echo "APP_VERSION=$TAG_NAME" >> $GITHUB_ENV
          echo "Release tag: $TAG_NAME"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update package.json version
        run: |
          VERSION=${APP_VERSION#v}
          npm version $VERSION --no-git-tag-version
          echo "Updated version to $VERSION"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add package.json package-lock.json || true
          git commit -m "chore: sync package.json version to $APP_VERSION" || echo "No changes to commit"
          git push origin main
